# =============================================================================
# risk_keywords.yaml — словник для генерації пошукових запитів у Serper API
# =============================================================================
#
# РЕДАГУВАННЯ СЛОВНИКА (для нетехнічних фахівців):
#   - Щоб додати нове ключове слово — просто допишіть новий рядок зі знаком "- "
#     у відповідну секцію мови (uk / ru / en).
#   - Слова з кількох слів беріть у лапки: - "відмивання грошей"
#   - Не змінюйте відступи (пробіли на початку рядків) — YAML чутливий до них.
#
# ЯК ГЕНЕРУЮТЬСЯ ЗАПИТИ (для розробників):
#   Worker-search бере ПІБ особи і комбінує його з цим словником двома способами:
#
#   Тип 1 — risk-only:
#     "{ПІБ} {risk_keyword}"
#     Приклад: "Іван Петренко санкції"
#
#   Тип 2 — risk + geo:
#     "{ПІБ} {risk_keyword} {geo_indicator}"
#     Приклад: "Іван Петренко санкції Росія"
#
#   Для кожної мови (uk / ru / en) генеруються обидва типи.
#   Максимальний теоретичний обсяг:
#     3 мови × ~6 risk × (1 + ~5 geo) = ~108 запитів на особу
#
#   На практиці worker-search дотримується ліміту max_queries_per_person (30).
#   Пріоритет: спочатку Тип 1 для всіх мов, потім Тип 2 з geo-індикаторами.
#   Налаштування ліміту — у секції search_settings нижче.
#
# =============================================================================


# -----------------------------------------------------------------------------
# RISK KEYWORDS — негативні терміни для пошуку adverse media
# -----------------------------------------------------------------------------

risk_keywords:

  uk:   # Українська
    - санкції
    - розслідування
    - корупція
    - відмивання
    - офшор
    - хабар
    - кримінал
    - шахрайство
    - ухилення
    - обвинувачення

  ru:   # Російська (шукаємо в українському Google-індексі — див. serper_locale_mapping)
    - расследование
    - коррупция
    - санкции
    - отмывание
    - офшор
    - взятка
    - мошенничество
    - уклонение
    - обвинение

  en:   # Англійська
    - investigation
    - corruption
    - sanctions
    - "money laundering"
    - offshore
    - bribery
    - fraud
    - embezzlement
    - indictment
    - "tax evasion"


# -----------------------------------------------------------------------------
# GEOGRAPHIC FOCUS — індикатори RF/BY для виявлення зв'язків з Росією/Білоруссю
# Комбінуються з risk_keywords тільки у запитах Типу 2 (risk + geo).
# -----------------------------------------------------------------------------

geographic_focus:

  uk:   # Українська
    - Росія
    - Білорусь
    - РФ
    - російський
    - білоруський
    - Кремль

  ru:   # Російська
    - Россия
    - Беларусь
    - российский
    - белорусский
    - Кремль

  en:   # Англійська
    - Russia
    - Belarus
    - Russian
    - Belarusian
    - Kremlin
    - "pro-Russian"


# -----------------------------------------------------------------------------
# SEARCH SETTINGS — налаштування логіки пошуку
# -----------------------------------------------------------------------------

search_settings:

  # Максимальна кількість запитів на одну особу (захист від перевитрати API-кредитів)
  max_queries_per_person: 30

  # Параметри локалізації для Serper API (gl = country, hl = language)
  # Документація: https://serper.dev — параметри gl/hl відповідають Google Search params
  serper_locale_mapping:
    uk: { gl: "ua", hl: "uk" }
    ru: { gl: "ua", hl: "ru" }   # шукаємо російською, але в українському Google-індексі
    en: { gl: "us", hl: "en" }


