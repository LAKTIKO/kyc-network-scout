services:

  redis:
    image: redis:7-alpine
    container_name: kyc-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - kyc-network
    restart: unless-stopped

  worker-search:
    build: .
    container_name: kyc-search
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --hostname=worker-search@%h
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kyc-network
    restart: unless-stopped

  worker-scraper:
    build: .
    container_name: kyc-scraper
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=1
      --hostname=worker-scraper@%h
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kyc-network
    restart: unless-stopped

  scheduler:
    build: .
    container_name: kyc-scheduler
    command: celery -A workers.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kyc-network
    restart: unless-stopped

networks:
  kyc-network:
    driver: bridge

volumes:
  redis-data:
