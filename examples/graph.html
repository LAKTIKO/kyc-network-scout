              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"font": {"color": "#222"}, "group": "company", "id": "\u0410\u041a\u0426\u0406\u041e\u041d\u0415\u0420\u041d\u0415 \u0422\u041e\u0412\u0410\u0420\u0418\u0421\u0422\u0412\u041e \u041a\u041e\u041c\u0415\u0420\u0426\u0406\u0419\u041d\u0418\u0419 \u0411\u0410\u041d\u041a \"\u041f\u0420\u0418\u0412\u0410\u0422\u0411\u0410\u041d\u041a\"", "label": "\u0410\u041a\u0426\u0406\u041e\u041d\u0415\u0420\u041d\u0415 \u0422\u041e\u0412\u0410\u0420\u0418\u0421\u0422\u0412\u041e \u041a\u041e\u041c\u0415\u0420\u0426\u0406\u0419\u041d\u0418\u0419 \u0411\u0410\u041d\u041a \"\u041f\u0420\u0418\u0412\u0410\u0422\u0411\u0410\u041d\u041a\"", "shape": "dot", "size": 10, "title": "\u041a\u043e\u043d\u0442\u0440\u0430\u0433\u0435\u043d\u0442"}, {"font": {"color": "#222"}, "group": "director", "id": "\u041a\u0435\u0440\u0456\u0432\u043d\u0438\u043a (\u0434\u0430\u043d\u0456 \u0437\u043d\u0435\u043e\u0441\u043e\u0431\u043b\u0435\u043d\u043e)", "label": "\u041a\u0435\u0440\u0456\u0432\u043d\u0438\u043a (\u0434\u0430\u043d\u0456 \u0437\u043d\u0435\u043e\u0441\u043e\u0431\u043b\u0435\u043d\u043e)", "shape": "dot", "size": 10, "title": "director"}, {"font": {"color": "#222"}, "group": "related", "id": "\u0404\u0414\u0418\u041d\u0418\u041c \u0410\u041a\u0426\u0406\u041e\u041d\u0415\u0420\u041e\u041c \u0411\u0410\u041d\u041a\u0423, \u042f\u041a\u041e\u041c\u0423 \u041d\u0410\u041b\u0415\u0416\u0418\u0422\u042c 100% \u0410\u041a\u0426\u0406\u0419 \u0411\u0410\u041d\u041a\u0423, \u0404 \u0414\u0415\u0420\u0416\u0410\u0412\u0410", "label": "\u0404\u0414\u0418\u041d\u0418\u041c \u0410\u041a\u0426\u0406\u041e\u041d\u0415\u0420\u041e\u041c \u0411\u0410\u041d\u041a\u0423, \u042f\u041a\u041e\u041c\u0423 \u041d\u0410\u041b\u0415\u0416\u0418\u0422\u042c 100% \u0410\u041a\u0426\u0406\u0419 \u0411\u0410\u041d\u041a\u0423, \u0404 \u0414\u0415\u0420\u0416\u0410\u0412\u0410", "shape": "dot", "size": 10, "title": "\u0437\u0430\u0441\u043d\u043e\u0432\u043d\u0438\u043a"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "\u0410\u041a\u0426\u0406\u041e\u041d\u0415\u0420\u041d\u0415 \u0422\u041e\u0412\u0410\u0420\u0418\u0421\u0422\u0412\u041e \u041a\u041e\u041c\u0415\u0420\u0426\u0406\u0419\u041d\u0418\u0419 \u0411\u0410\u041d\u041a \"\u041f\u0420\u0418\u0412\u0410\u0422\u0411\u0410\u041d\u041a\"", "title": "director", "to": "\u041a\u0435\u0440\u0456\u0432\u043d\u0438\u043a (\u0434\u0430\u043d\u0456 \u0437\u043d\u0435\u043e\u0441\u043e\u0431\u043b\u0435\u043d\u043e)", "width": 1}, {"arrows": "to", "from": "\u0410\u041a\u0426\u0406\u041e\u041d\u0415\u0420\u041d\u0415 \u0422\u041e\u0412\u0410\u0420\u0418\u0421\u0422\u0412\u041e \u041a\u041e\u041c\u0415\u0420\u0426\u0406\u0419\u041d\u0418\u0419 \u0411\u0410\u041d\u041a \"\u041f\u0420\u0418\u0412\u0410\u0422\u0411\u0410\u041d\u041a\"", "title": "\u0437\u0430\u0441\u043d\u043e\u0432\u043d\u0438\u043a", "to": "\u0404\u0414\u0418\u041d\u0418\u041c \u0410\u041a\u0426\u0406\u041e\u041d\u0415\u0420\u041e\u041c \u0411\u0410\u041d\u041a\u0423, \u042f\u041a\u041e\u041c\u0423 \u041d\u0410\u041b\u0415\u0416\u0418\u0422\u042c 100% \u0410\u041a\u0426\u0406\u0419 \u0411\u0410\u041d\u041a\u0423, \u0404 \u0414\u0415\u0420\u0416\u0410\u0412\u0410", "width": 1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"barnesHut": {"gravitationalConstant": -8000}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
